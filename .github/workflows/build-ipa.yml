name: Build IPA
run-name: ${{ github.event_name == 'push' && github.event.head_commit.message || format('Build IPA ({0})', github.sha) }}

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate App Icon asset catalog
        run: |
          chmod +x scripts/generate_appicon.sh
          python3 -m compileall scripts/generate_appicon_contents.py
          scripts/generate_appicon.sh "WorkLogApp/Resources/IconSource/AppIcon.icns" "WorkLogApp/Resources/Assets.xcassets"

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project WorkLog.xcodeproj \
            -scheme WorkLog \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            MARKETING_VERSION=1.0 \
            CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(ls -1d build/Build/Products/Release-iphoneos/*.app 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found at build/Build/Products/Release-iphoneos"
            ls -la build/Build/Products/Release-iphoneos || true
            exit 1
          fi

          echo "App path: $APP_PATH"
          rm -rf Payload WorkLog.ipa
          mkdir -p Payload
          /usr/bin/ditto "$APP_PATH" "Payload/WorkLog.app"
          /usr/bin/zip -qry WorkLog.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkLog-ipa
          path: WorkLog.ipa
