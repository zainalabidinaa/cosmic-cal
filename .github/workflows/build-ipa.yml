name: Build IPA
run-name: ${{ github.event_name == 'push' && github.event.head_commit.message || format('Build IPA ({0})', github.sha) }}

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build IPA (${{ matrix.lane }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: stable
            runner: macos-15
            xcode: "16.4"
            deployment_target: "18.0"
            swift_flags: "$(inherited)"
            artifact_name: WorkLog-ipa
            ipa_name: WorkLog.ipa
            allow_failure: false
          - lane: experimental
            runner: macos-latest
            xcode: latest
            deployment_target: "26.0"
            swift_flags: "$(inherited) -DEXPERIMENTAL_LIQUID_GLASS"
            artifact_name: WorkLog-ipa-experimental
            ipa_name: WorkLog-experimental.ipa
            allow_failure: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Show active Xcode and SDKs
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate App Icon asset catalog
        run: |
          chmod +x scripts/generate_appicon.sh
          python3 -m compileall scripts/generate_appicon_contents.py
          scripts/generate_appicon.sh "WorkLogApp/Resources/IconSource/AppIcon.icns" "WorkLogApp/Resources/Assets.xcassets"

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project WorkLog.xcodeproj \
            -scheme WorkLog \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            MARKETING_VERSION=1.0 \
            CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER \
            IPHONEOS_DEPLOYMENT_TARGET=${{ matrix.deployment_target }} \
            OTHER_SWIFT_FLAGS='${{ matrix.swift_flags }}' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(ls -1d build/Build/Products/Release-iphoneos/*.app 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found at build/Build/Products/Release-iphoneos"
            ls -la build/Build/Products/Release-iphoneos || true
            exit 1
          fi

          echo "App path: $APP_PATH"
          rm -rf Payload "${{ matrix.ipa_name }}"
          mkdir -p Payload
          /usr/bin/ditto "$APP_PATH" "Payload/WorkLog.app"
          /usr/bin/zip -qry "${{ matrix.ipa_name }}" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.ipa_name }}
