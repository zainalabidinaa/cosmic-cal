name: WorkLog
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Release
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  WorkLog:
    type: application
    platform: iOS
    sources:
      - path: WorkLogApp/Sources
      - path: WorkLogApp/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zainalabidinaa.labmedicinlu
        INFOPLIST_FILE: WorkLogApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - sdk: EventKit.framework
