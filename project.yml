name: WorkLog
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Release
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  WorkLog:
    type: application
    platform: iOS
    sources:
      - path: WorkLogApp/Sources
    resources:
      - path: WorkLogApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zainalabidinaa.labmedicinlu
        INFOPLIST_FILE: WorkLogApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: WorkLogApp/Info.plist
    dependencies:
      - sdk: EventKit.framework
